<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="maxdhml — Article">
    <title>maxdhml | Article</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="editor.css">
    <!-- Highlight.js for code blocks -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
</head>

<body>
    <div class="top-banner">
        <span data-i18n="banner">🟢 En recherche d'alternance — <a href="CV Maxime DUHAMEL - Alternance.pdf"
                download>voir mon CV</a></span>
    </div>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="profile-section">
                    <div class="avatar"><img src="avatar.png" alt="maxdhml avatar"></div>
                    <div>
                        <div class="profile-name">maxdhml</div>
                        <div class="profile-sub" data-i18n="profile-sub">Portfolio &amp; writeups</div>
                    </div>
                </div>
                <button class="btn-lang" onclick="toggleLanguage()">
                    <span data-i18n="btn-lang-label">🇬🇧 EN</span>
                </button>
                <button id="hamburger-btn" class="btn-hamburger" aria-label="Menu" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
            </div>

            <nav id="nav-menu">
                <ul class="nav-links">
                    <li><a href="index.html" data-i18n="nav-writeup">Write Up</a></li>
                    <li><a href="portfolio.html" data-i18n="nav-portfolio">Portfolio</a></li>
                    <li><a href="contact.html" data-i18n="nav-contacts">Contacts</a></li>
                    <li><a href="about.html" data-i18n="nav-about">About</a></li>
                </ul>
            </nav>

            <a href="CV Maxime DUHAMEL - Alternance.pdf" download class="btn-download">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                CV
            </a>

            <footer><span data-i18n="footer">© 2026 maxdhml</span></footer>
        </aside>

        <main class="main-content">
            <div id="article-back" class="article-back">
                <a href="index.html" id="back-link">← Retour</a>
            </div>
            <article id="article-container" class="article-content">
                <div class="editor-empty">
                    <div class="editor-empty-icon">📄</div>
                    <p>Chargement de l'article…</p>
                </div>
            </article>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <script src="script.js"></script>
    <script>
        /* ─── Article Viewer ─── */
        (function () {
            const params = new URLSearchParams(window.location.search);
            const type = params.get('type'); // 'writeup' or 'project'
            const id = params.get('id');

            if (!type || !id) {
                document.getElementById('article-container').innerHTML =
                    '<p style="color:var(--text-secondary)">Article non trouvé.</p>';
                return;
            }

            const storageKey = type === 'writeup' ? 'editor_writeups' : 'editor_projects';
            const backPage = type === 'writeup' ? 'index.html' : 'portfolio.html';

            // Update back link
            document.getElementById('back-link').href = backPage;

            try {
                const items = JSON.parse(localStorage.getItem(storageKey) || '[]');
                const item = items.find(i => i.id === id);

                if (!item) {
                    document.getElementById('article-container').innerHTML =
                        '<p style="color:var(--text-secondary)">Article non trouvé.</p>';
                    return;
                }

                // Update title
                document.title = `maxdhml | ${item.title}`;

                // Render article
                document.getElementById('article-container').innerHTML = `
                    <h1>${item.title}</h1>
                    <div class="article-meta">
                        ${new Date(item.createdAt).toLocaleDateString('fr-FR', {
                    day: 'numeric', month: 'long', year: 'numeric'
                })}
                    </div>
                    ${item.content}
                `;

                // Syntax highlight code blocks
                document.querySelectorAll('#article-container pre').forEach(block => {
                    hljs.highlightElement(block);
                });

            } catch (err) {
                document.getElementById('article-container').innerHTML =
                    '<p style="color:var(--text-secondary)">Erreur lors du chargement.</p>';
            }
        })();
    </script>
</body>

</html>
