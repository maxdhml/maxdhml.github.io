<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="maxdhml — Rapports et découvertes bug bounty YesWeHack.">
    <title>maxdhml | YesWeHack Write Ups</title>
    <link rel="icon" type="image/png" href="../../favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="../../style.css">
</head>

<body>
    <div class="top-banner">
        <span>🟢 En recherche d'alternance — <a href="../../CV Maxime DUHAMEL - Alternance.pdf"
                download>voir mon CV</a></span>
    </div>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="profile-section">
                    <div class="avatar"><img src="../../avatar.png" alt="maxdhml avatar"></div>
                    <div>
                        <div class="profile-name">maxdhml</div>
                        <div class="profile-sub">Portfolio &amp; writeups</div>
                    </div>
                </div>

                <button id="hamburger-btn" class="btn-hamburger" aria-label="Menu" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
            </div>

            <nav id="nav-menu">
                <ul class="nav-links">
                    <li><a href="../../index.html" class="active">Write Up</a></li>
                    <li><a href="../../portfolio.html">Portfolio</a></li>
                    <li><a href="../../contact.html">Contacts</a></li>
                    <li><a href="../../about.html">About</a></li>
                </ul>
            </nav>

            <a href="../../CV Maxime DUHAMEL - Alternance.pdf" download class="btn-download">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                CV
            </a>

            <footer><span>© 2026 maxdhml</span></footer>
        </aside>

        <main class="main-content">
            <section id="writeups">
                <h2 class="section-title">YesWeHack Write Ups</h2>
                <ul id="articles-list" class="writeup-list">
                    <li class="writeup-card">
                        <div class="card-content">
                            <div class="card-title">Chargement…</div>
                            <div class="card-desc"></div>
                        </div>
                    </li>
                </ul>
            </section>
        </main>
    </div>

    <script src="../../script.js"></script>
    <script>
        /* Load articles from articles.json */
        (function () {
            fetch('articles.json')
                .then(r => r.json())
                .then(articles => {
                    const list = document.getElementById('articles-list');
                    if (!articles || articles.length === 0) {
                        list.innerHTML = `
                            <li class="writeup-card">
                                <div class="card-content">
                                    <div class="card-title">Coming Soon</div>
                                    <div class="card-desc">Write-ups will be listed here.</div>
                                </div>
                            </li>`;
                        return;
                    }
                    list.innerHTML = articles.map(a => `
                        <li class="writeup-card" role="link" tabindex="0"
                            onclick="window.location.href='../../article-viewer.html?path=write-ups/YesWeHack%20Write%20Ups/${encodeURIComponent(a.file || a.slug + '.md')}'">
                            <div class="card-content">
                                <div class="card-title">${a.title}</div>
                                <div class="card-desc">${a.desc || ''}</div>
                            </div>
                        </li>
                    `).join('');
                })
                .catch(() => {
                    document.getElementById('articles-list').innerHTML = `
                        <li class="writeup-card">
                            <div class="card-content">
                                <div class="card-title">Coming Soon</div>
                                <div class="card-desc">Write-ups will be listed here.</div>
                            </div>
                        </li>`;
                });
        })();
    </script>
</body>

</html>
